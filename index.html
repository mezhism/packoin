<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackAge+ 永續生活 App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes scanner-move {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(280px); }
        }
        .animate-scanner-move {
            animation: scanner-move 2s infinite ease-in-out;
        }
        body { background-color: #f8fafc; font-family: sans-serif; }
        #root { min-height: 100vh; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 通用 Lucide Icon 元件，解決全域圖示引用問題
        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name]);

            const lucideName = name.toLowerCase().replace(/([a-z])([A-Z])/g, '$1-$2');
            return (
                <i ref={iconRef} data-lucide={lucideName} 
                   style={{ width: size, height: size, display: 'inline-block', stroke: 'currentColor', strokeWidth: 2, fill: fill }}
                   className={className}></i>
            );
        };

        // --- Gemini API 參數設定 ---
        const apiKey = ""; // 請在此處填入您的 API Key
        const GEMINI_MODEL = "gemini-1.5-flash"; // 建議使用穩定型號

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [selectedStation, setSelectedStation] = useState(null);
            const [mapFilter, setMapFilter] = useState('all');
            const [showScanSuccess, setShowScanSuccess] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [packoin, setPackoin] = useState(1280);
            
            // --- 電子雞遊戲狀態 ---
            const [petStats, setPetStats] = useState({ hunger: 70, happiness: 80, health: 90, exp: 45, level: 2, status: 'Happy' });
            const [gameMsg, setGameMsg] = useState('哈囉！今天也要一起愛地球喔！');

            // AI 相關狀態
            const [showAiAssistant, setShowAiAssistant] = useState(false);
            const [aiInput, setAiInput] = useState('');
            const [chatHistory, setChatHistory] = useState([
                { role: 'ai', text: '您好！我是您的 ✨ PackAge+ 減碳助手。想知道如何更有效利用 PACKOIN，或是查詢最近的回收技巧嗎？' }
            ]);
            const [isAiTyping, setIsAiTyping] = useState(false);

            const stations = [
                { id: 1, name: '全家便利商店 - 台北松山店', distance: '250m', type: 'both', lat: 45, lng: 35 },
                { id: 2, name: '7-11 - 興雅門市', distance: '450m', type: 'return', lat: 60, lng: 55 },
                { id: 3, name: '誠品書店 - 信義店', distance: '1.2km', type: 'rent', lat: 30, lng: 75 },
                { id: 4, name: '萊爾富 - 北市旗艦店', distance: '850m', type: 'both', lat: 20, lng: 40 },
                { id: 5, name: '里仁有機 - 南京店', distance: '1.5km', type: 'rent', lat: 75, lng: 25 },
            ];

            const interactPet = (type) => {
                setPetStats(prev => {
                    let next = { ...prev };
                    if (type === 'feed') { next.hunger = Math.min(100, prev.hunger + 10); setGameMsg('嗯～這份有機飼料真好吃！'); }
                    else if (type === 'play') { next.happiness = Math.min(100, prev.happiness + 15); next.exp = prev.exp + 5; setGameMsg('耶！最喜歡跟你一起玩了！'); }
                    else if (type === 'clean') { next.health = Math.min(100, prev.health + 10); setGameMsg('感覺好清爽，謝謝你！'); }
                    return next;
                });
                setTimeout(() => setGameMsg('哈囉！今天也要一起愛地球喔！'), 3000);
            };

            useEffect(() => {
                if (isScanning) {
                    const timer = setTimeout(() => {
                        setIsScanning(false);
                        setShowScanSuccess(true);
                        setPackoin(p => p + 50);
                        setPetStats(p => ({ ...p, exp: p.exp + 20 }));
                        setTimeout(() => { setShowScanSuccess(false); setSelectedStation(null); setActiveTab('mall'); }, 2000);
                    }, 2500);
                    return () => clearTimeout(timer);
                }
            }, [isScanning]);

            const handleSendMessage = async () => {
                if (!aiInput.trim()) return;
                const userMsg = aiInput;
                setChatHistory(prev => [...prev, { role: 'user', text: userMsg }]);
                setAiInput('');
                setIsAiTyping(true);

                // 模擬 API 呼叫 (若無 Key 則回傳模擬回應)
                if (!apiKey) {
                    setTimeout(() => {
                        setChatHistory(prev => [...prev, { role: 'ai', text: '這是 AI 模擬回應。填入 API Key 後即可與真實 Gemini 模型對話！' }]);
                        setIsAiTyping(false);
                    }, 1000);
                    return;
                }

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: userMsg }] }] })
                    });
                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "抱歉，我現在無法回答。";
                    setChatHistory(prev => [...prev, { role: 'ai', text: aiText }]);
                } catch (e) {
                    setChatHistory(prev => [...prev, { role: 'ai', text: "連線異常，請檢查 API 設定。" }]);
                } finally {
                    setIsAiTyping(false);
                }
            };

            return (
                <div className="flex flex-col h-screen bg-slate-50 max-w-md mx-auto overflow-hidden shadow-2xl border-x relative">
                    {/* Header */}
                    <header className="px-6 pt-12 pb-4 bg-white flex justify-between items-end border-b z-10 shadow-sm">
                        <div>
                            <h1 className="text-2xl font-black text-[#49B5A8] tracking-tight">PackAge+</h1>
                            <p className="text-[10px] text-slate-400 font-bold tracking-[0.15em] mb-1 uppercase">Circular Life</p>
                        </div>
                        <button onClick={() => setShowAiAssistant(true)} className="bg-emerald-50 text-emerald-600 p-2 rounded-2xl border border-emerald-100 flex items-center gap-2 shadow-sm active:scale-95 transition-all">
                            <Icon name="Sparkles" size={18} />
                            <span className="text-xs font-bold">AI 助手</span>
                        </button>
                    </header>

                    {/* Main Scroll Area */}
                    <main className="flex-1 overflow-y-auto scrollbar-hide relative bg-slate-50">
                        {activeTab === 'home' && (
                            <div className="p-6 space-y-8 animate-in fade-in pb-20">
                                {/* Pet Section */}
                                <section className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 relative">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex items-center gap-2 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100">
                                            <Icon name="Trophy" size={14} className="text-emerald-500" />
                                            <span className="text-[10px] font-black text-emerald-600 uppercase">LV.{petStats.level} 成長中</span>
                                        </div>
                                        <div className="bg-slate-50 px-2 py-1 rounded-lg text-[10px] font-bold text-slate-400 flex items-center gap-1">
                                            <Icon name="Heart" size={10} fill="#f43f5e" className="text-[#f43f5e]" /> {petStats.happiness}%
                                        </div>
                                    </div>
                                    <div className="py-8 flex flex-col items-center justify-center relative">
                                        <div className="w-32 h-32 bg-emerald-50 rounded-full flex items-center justify-center animate-bounce duration-[2000ms]">
                                            <img src={`https://api.dicebear.com/7.x/bottts/svg?seed=EcoPet&backgroundColor=b6e3f4`} alt="Pet" className="w-20 h-20" />
                                        </div>
                                        <div className="absolute -top-2 right-4 bg-[#49B5A8] text-white p-3 rounded-2xl rounded-bl-none shadow-lg text-[11px] font-bold max-w-[140px]">{gameMsg}</div>
                                        <div className="w-48 bg-slate-100 h-2 rounded-full mt-6 overflow-hidden">
                                            <div className="bg-emerald-400 h-full transition-all duration-500" style={{ width: `${petStats.exp}%` }}></div>
                                        </div>
                                    </div>
                                    <div className="flex justify-around gap-2 mt-4 pt-4 border-t border-slate-50">
                                        <button onClick={() => interactPet('feed')} className="flex flex-col items-center gap-1"><div className="p-3 bg-amber-50 text-amber-500 rounded-2xl"><Icon name="Utensils" size={20} /></div><span className="text-[10px] font-bold text-slate-400">餵食</span></button>
                                        <button onClick={() => interactPet('play')} className="flex flex-col items-center gap-1"><div className="p-3 bg-blue-50 text-blue-500 rounded-2xl"><Icon name="Gamepad2" size={20} /></div><span className="text-[10px] font-bold text-slate-400">玩耍</span></button>
                                        <button onClick={() => interactPet('clean')} className="flex flex-col items-center gap-1"><div className="p-3 bg-cyan-50 text-cyan-500 rounded-2xl"><Icon name="Droplets" size={20} /></div><span className="text-[10px] font-bold text-slate-400">清潔</span></button>
                                    </div>
                                </section>
                                
                                <section>
                                    <h3 className="font-black text-slate-900 mb-4 flex items-center gap-2 px-2"><Icon name="Leaf" size={18} className="text-[#49B5A8]" />永續專欄</h3>
                                    <div className="grid grid-cols-2 gap-4 px-2">
                                        <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm"><h4 className="font-black text-sm text-slate-800">減碳名人榜</h4><p className="text-[10px] text-slate-400">看看本月誰是代言人！</p></div>
                                        <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm"><h4 className="font-black text-sm text-slate-800">包材小知識</h4><p className="text-[10px] text-slate-400">碳足跡計算秘訣</p></div>
                                    </div>
                                </section>
                                
                                <section className="px-2">
                                    <h3 className="font-black text-slate-900 mb-4 flex items-center gap-2"><Icon name="Newspaper" size={18} className="text-[#49B5A8]" />環保報導</h3>
                                    <div className="space-y-4">
                                        {['攜手全家打造回收鏈', '企業禮品提袋客製化', '2024 包裝減量指南'].map((title, i) => (
                                            <div key={i} className="bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm flex items-center p-3 gap-4">
                                                <div className="w-16 h-16 bg-slate-100 rounded-2xl overflow-hidden flex-shrink-0">
                                                    <img src={`https://picsum.photos/seed/${i+10}/100/100`} className="w-full h-full object-cover" />
                                                </div>
                                                <h4 className="text-[11px] font-black text-slate-800 leading-snug">{title}</h4>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {activeTab === 'map' && (
                            <div className="h-full flex flex-col relative bg-slate-100">
                                <div className="flex-1 relative bg-slate-200 overflow-hidden">
                                    <div className="absolute inset-0 bg-[radial-gradient(#cbd5e1_1px,transparent_1px)] [background-size:20px_20px] opacity-30"></div>
                                    {stations.filter(s => mapFilter === 'all' || s.type === mapFilter || s.type === 'both').map(s => (
                                        <button key={s.id} onClick={() => setSelectedStation(s)} className={`absolute transform -translate-x-1/2 -translate-y-1/2 transition-all ${selectedStation?.id === s.id ? 'scale-125 z-20' : 'z-10'}`} style={{ left: `${s.lat}%`, top: `${s.lng}%` }}>
                                            <div className={`p-2 rounded-full shadow-lg border-2 ${s.type === 'return' ? 'bg-blue-500 border-white' : 'bg-[#49B5A8] border-white'}`}>
                                                <Icon name="MapPin" size={20} className="text-white" />
                                            </div>
                                        </button>
                                    ))}
                                    <div className="absolute top-4 left-4 right-4 space-y-2">
                                        <div className="bg-white/90 backdrop-blur-md p-1 rounded-2xl shadow-xl flex gap-1">
                                            {['all', 'rent', 'return'].map(f => (
                                                <button key={f} onClick={() => setMapFilter(f)} className={`flex-1 py-2 text-[10px] font-black rounded-xl ${mapFilter === f ? 'bg-slate-900 text-white shadow-md' : 'text-slate-400 hover:bg-slate-50'}`}>
                                                    {f === 'all' ? '全部顯示' : f === 'rent' ? '我要租借' : '我要歸還'}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                {selectedStation && (
                                    <div className="bg-white rounded-t-[2.5rem] p-6 shadow-2xl animate-in slide-in-from-bottom-full z-40 relative">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <span className="text-[9px] font-black px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600 uppercase tracking-tighter">{selectedStation.type}</span>
                                                <h3 className="text-xl font-black text-slate-900 mt-1">{selectedStation.name}</h3>
                                            </div>
                                            <button onClick={() => setSelectedStation(null)} className="p-2 bg-slate-50 rounded-full"><Icon name="X" size={18} className="text-slate-400" /></button>
                                        </div>
                                        <div className="flex gap-2">
                                            <button className="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2"><Icon name="Navigation" size={18} />導航</button>
                                            <button onClick={() => setIsScanning(true)} className="flex-[2] bg-[#49B5A8] text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 transition-all"><Icon name="Scan" size={18} />確認租還動作</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'mall' && (
                            <div className="p-6 space-y-6 animate-in fade-in">
                                <div className="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm flex justify-between items-center">
                                    <div><p className="text-xs font-bold text-slate-400 mb-1">可用 PACKOIN</p><span className="text-3xl font-black text-slate-900">{packoin.toLocaleString()}</span></div>
                                    <Icon name="Wallet" size={32} className="text-amber-500" />
                                </div>
                                <div className="space-y-3 px-2">
                                    <h3 className="font-black text-slate-900">熱門兌換</h3>
                                    {[{ t: '全家大杯美式', p: 800, i: '☕' }, { t: '拍賣抵用券', p: 500, i: '🚚' }].map((item, i) => (
                                        <div key={i} className="bg-white p-4 rounded-3xl flex justify-between items-center border border-slate-100">
                                            <div className="flex items-center gap-3">
                                                <span className="text-2xl">{item.i}</span>
                                                <div><p className="font-bold text-slate-800 text-sm">{item.t}</p><p className="text-[10px] text-amber-500 font-bold">{item.p} P+</p></div>
                                            </div>
                                            <button onClick={() => { if(packoin >= item.p) setPackoin(packoin - item.p); }} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold active:bg-emerald-500">兌換</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'info' && (
                            <div className="p-6 space-y-6 animate-in fade-in overflow-y-auto h-full">
                                <div className="bg-white rounded-[2.5rem] p-8 text-center border border-slate-100 shadow-sm relative overflow-hidden">
                                    <div className="w-20 h-20 bg-slate-100 rounded-full mx-auto mb-4 overflow-hidden border-4 border-white shadow-lg">
                                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" />
                                    </div>
                                    <h3 className="text-2xl font-black text-slate-900">周小明</h3>
                                    <p className="text-slate-400 text-xs mb-6 font-bold tracking-tight">加入第 124 天</p>
                                    <div className="bg-emerald-900 text-white rounded-3xl p-5 flex items-center justify-between text-left shadow-lg">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-emerald-400/20 p-2 rounded-xl"><Icon name="Crown" size={24} className="text-emerald-300" /></div>
                                            <div><p className="text-[10px] font-bold text-emerald-300 uppercase tracking-widest">專業方案</p><p className="text-sm font-black">Unlimited Pro</p></div>
                                        </div>
                                        <Icon name="ChevronRight" size={18} />
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    {['訂閱方案管理', '租還歷史紀錄', '幫助中心'].map((item, i) => (
                                        <div key={i} className="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center text-sm font-black">
                                            <span className="text-slate-700">{item}</span>
                                            <Icon name="ChevronRight" size={18} className="text-slate-300" />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* AI Assistant UI */}
                    {showAiAssistant && (
                        <div className="absolute inset-0 bg-white z-[90] flex flex-col animate-in slide-in-from-bottom-full duration-300">
                            <div className="px-6 pt-12 pb-4 flex justify-between items-center border-b">
                                <div className="flex items-center gap-2"><Icon name="Sparkles" className="text-emerald-500" size={20} /><h2 className="text-lg font-black">PackAge+ AI</h2></div>
                                <button onClick={() => setShowAiAssistant(false)} className="p-2 bg-slate-50 rounded-full"><Icon name="X" size={20} /></button>
                            </div>
                            <div className="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50 scrollbar-hide">
                                {chatHistory.map((msg, i) => (
                                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-4 rounded-2xl text-xs font-medium shadow-sm ${msg.role === 'user' ? 'bg-slate-900 text-white rounded-tr-none' : 'bg-white border border-slate-100 rounded-tl-none'}`}>{msg.text}</div>
                                    </div>
                                ))}
                                {isAiTyping && <div className="flex justify-start"><div className="bg-white p-4 rounded-2xl shadow-sm"><div className="flex gap-1"><div className="w-1 h-1 bg-slate-400 rounded-full animate-bounce"></div><div className="w-1 h-1 bg-slate-400 rounded-full animate-bounce [animation-delay:0.2s]"></div><div className="w-1 h-1 bg-slate-400 rounded-full animate-bounce [animation-delay:0.4s]"></div></div></div></div>}
                            </div>
                            <div className="p-4 bg-white border-t flex gap-2">
                                <input type="text" value={aiInput} onChange={(e) => setAiInput(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()} placeholder="詢問 PackAge+ 資訊..." className="flex-1 bg-slate-100 px-4 py-3 rounded-2xl text-xs outline-none font-medium" />
                                <button onClick={handleSendMessage} className="bg-emerald-500 text-white p-3 rounded-2xl shadow-lg active:scale-95 transition-all"><Icon name="Send" size={18} /></button>
                            </div>
                        </div>
                    )}

                    {/* Scanner Overlay */}
                    {isScanning && (
                        <div className="absolute inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center text-white p-6">
                            <div className="relative w-72 h-72">
                                <div className="absolute inset-0 border-2 border-white/20 rounded-3xl overflow-hidden">
                                    <div className="absolute top-0 w-full h-1 bg-[#49B5A8] shadow-[0_0_15px_#49B5A8] animate-scanner-move"></div>
                                    <div className="absolute inset-0 flex items-center justify-center opacity-20"><Icon name="Scan" size={120} /></div>
                                </div>
                            </div>
                            <div className="mt-12 text-center space-y-2">
                                <div className="flex items-center justify-center gap-2"><Icon name="Loader2" className="animate-spin text-[#49B5A8]" size={20} /><h3 className="text-lg font-black">正在識別 QR Code...</h3></div>
                                <p className="text-xs text-slate-400 font-bold uppercase tracking-widest">Scanning Circular Package</p>
                            </div>
                            <button onClick={() => setIsScanning(false)} className="mt-12 bg-white/10 p-4 rounded-full backdrop-blur-md border border-white/10"><Icon name="X" size={24} /></button>
                        </div>
                    )}

                    {/* Success Message */}
                    {showScanSuccess && (
                        <div className="absolute inset-0 bg-[#49B5A8] z-[120] flex flex-col items-center justify-center text-white animate-in zoom-in duration-300">
                            <Icon name="CheckCircle2" size={80} className="mb-4" />
                            <h2 className="text-3xl font-black mb-2">歸還成功！</h2>
                            <p className="font-bold opacity-80 mb-6 tracking-wider">PACKOIN +50</p>
                            <div className="bg-white/20 px-6 py-3 rounded-full font-black text-sm flex items-center gap-2 border border-white/20 shadow-xl">
                                <Icon name="Leaf" size={18} /> 小精靈獲得成長值！
                            </div>
                        </div>
                    )}

                    {/* Bottom Nav */}
                    <nav className="bg-white border-t px-6 py-4 flex justify-between items-center z-10 shadow-lg">
                        {[
                            { id: 'home', icon: 'Home', label: '主頁' },
                            { id: 'map', icon: 'MapPin', label: '地圖' },
                            { id: 'scan', icon: 'Scan', label: '掃描', special: true },
                            { id: 'mall', icon: 'ShoppingBag', label: '商城' },
                            { id: 'info', icon: 'User', label: '個人' }
                        ].map((t) => (
                            t.special ? (
                                <button key={t.id} onClick={() => setIsScanning(true)} className="w-14 h-14 bg-slate-900 text-white rounded-2xl shadow-xl flex items-center justify-center border-4 border-white active:scale-90 transition-all -mt-8">
                                    <Icon name={t.icon} size={24} />
                                </button>
                            ) : (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex flex-col items-center gap-1 transition-all ${activeTab === t.id ? 'text-[#49B5A8] scale-110' : 'text-slate-300'}`}>
                                    <Icon name={t.icon} size={22} fill={activeTab === t.id ? 'currentColor' : 'none'} />
                                    <span className="text-[9px] font-black uppercase tracking-widest">{t.label}</span>
                                </button>
                            )
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
