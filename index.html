<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackAge+ 永續生活 App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @keyframes scanner-move {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(280px); }
        }
        .animate-scanner-move { animation: scanner-move 2s infinite ease-in-out; }
        
        body { 
            background-color: #f1f5f9; /* 淺灰色網頁背景 */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* 這裡控制 App 的一頁式規格 */
        .app-viewport {
            width: 400px;
            height: 720px; /* 維持一頁高度 */
            background: #ffffff;
            position: relative;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* 淡淡的投影 */
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({ icons: { [name]: window.lucide.icons[name] }, nameAttr: 'data-lucide' });
                }
            }, [name]);
            const lucideName = name.toLowerCase().replace(/([a-z])([A-Z])/g, '$1-$2');
            return <i ref={iconRef} data-lucide={lucideName} style={{ width: size, height: size, display: 'inline-block', stroke: 'currentColor', strokeWidth: 2, fill: fill }} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isScanning, setIsScanning] = useState(false);
            const [showScanSuccess, setShowScanSuccess] = useState(false);
            const [packoin, setPackoin] = useState(1280);
            
            // 電子雞邏輯
            const [petStats, setPetStats] = useState({ hunger: 70, happiness: 80, level: 2 });
            const [gameMsg, setGameMsg] = useState('哈囉！今天也要一起愛地球喔！');

            const interactPet = (type) => {
                if (type === 'feed') {
                    setPetStats(prev => ({ ...prev, hunger: Math.min(100, prev.hunger + 10) }));
                    setGameMsg('（嚼嚼）有機飼料真香！');
                } else if (type === 'play') {
                    setPetStats(prev => ({ ...prev, happiness: Math.min(100, prev.happiness + 15) }));
                    setGameMsg('耶！最喜歡玩耍了！');
                }
                setTimeout(() => setGameMsg('哈囉！今天也要一起愛地球喔！'), 2500);
            };

            const handleScan = () => {
                setIsScanning(true);
                setTimeout(() => {
                    setIsScanning(false);
                    setShowScanSuccess(true);
                    setPackoin(p => p + 50);
                    setTimeout(() => { setShowScanSuccess(false); setActiveTab('mall'); }, 2000);
                }, 2500);
            };

            return (
                <div className="app-viewport">
                    {/* Header */}
                    <header className="px-6 pt-10 pb-4 bg-white flex justify-between items-end border-b shrink-0">
                        <div>
                            <h1 className="text-2xl font-black text-[#49B5A8] tracking-tight">PackAge+</h1>
                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Circular Life</p>
                        </div>
                        <div className="bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-2xl flex items-center gap-2 border border-emerald-100">
                            <Icon name="Sparkles" size={16} />
                            <span className="text-[10px] font-bold">AI 助手</span>
                        </div>
                    </header>

                    {/* Main Scroll Content */}
                    <main className="flex-1 overflow-y-auto scrollbar-hide bg-slate-50 relative pb-10">
                        {activeTab === 'home' && (
                            <div className="p-6 space-y-6 animate-in fade-in">
                                {/* 電子雞區塊 */}
                                <section className="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-100 text-center relative">
                                    <div className="flex justify-between mb-4">
                                        <div className="bg-emerald-50 px-3 py-1 rounded-full text-[10px] font-black text-emerald-600">LV.{petStats.level} 成長中</div>
                                        <div className="text-[10px] font-bold text-rose-500">❤️ {petStats.happiness}%</div>
                                    </div>
                                    <div className="py-6 flex flex-col items-center">
                                        <div className="w-28 h-28 bg-emerald-50 rounded-full flex items-center justify-center animate-bounce duration-[3000ms]">
                                            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Eco" className="w-20" />
                                        </div>
                                        <div className="mt-4 bg-[#49B5A8] text-white px-4 py-2 rounded-2xl text-[11px] font-bold shadow-md">{gameMsg}</div>
                                    </div>
                                    <div className="flex justify-around pt-4 border-t border-slate-50">
                                        <button onClick={() => interactPet('feed')} className="p-3 bg-amber-50 text-amber-500 rounded-2xl"><Icon name="Utensils" size={20} /></button>
                                        <button onClick={() => interactPet('play')} className="p-3 bg-blue-50 text-blue-500 rounded-2xl"><Icon name="Gamepad2" size={20} /></button>
                                        <button className="p-3 bg-cyan-50 text-cyan-500 rounded-2xl"><Icon name="Droplets" size={20} /></button>
                                    </div>
                                </section>

                                {/* 模擬列表 */}
                                <h3 className="font-black text-slate-800 text-sm px-2">環保報導</h3>
                                {['攜手全家打造回收鏈', '2024 包裝減量指南', '循環袋真的環保嗎？'].map((title, i) => (
                                    <div key={i} className="bg-white rounded-3xl p-4 border border-slate-100 flex items-center gap-4">
                                        <div className="w-16 h-16 bg-slate-100 rounded-2xl overflow-hidden shrink-0">
                                            <img src={`https://picsum.photos/seed/${i+40}/100/100`} className="w-full h-full object-cover" />
                                        </div>
                                        <h4 className="text-[11px] font-black text-slate-800 leading-snug">{title}</h4>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {activeTab === 'mall' && (
                            <div className="p-6 space-y-6">
                                <div className="bg-white rounded-3xl p-6 border flex justify-between items-center">
                                    <div><p className="text-xs text-slate-400 font-bold uppercase">Packoin</p><span className="text-3xl font-black text-slate-900">{packoin}</span></div>
                                    <Icon name="Wallet" size={32} className="text-amber-500" />
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav */}
                    <nav className="bg-white border-t px-6 py-4 flex justify-between items-center shrink-0 shadow-lg">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 ${activeTab === 'home' ? 'text-slate-900' : 'text-slate-300'}`}>
                            <Icon name="Home" size={22} fill={activeTab === 'home' ? 'currentColor' : 'none'} />
                            <span className="text-[9px] font-black uppercase">主頁</span>
                        </button>
                        <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center gap-1 ${activeTab === 'map' ? 'text-slate-900' : 'text-slate-300'}`}>
                            <Icon name="MapPin" size={22} />
                            <span className="text-[9px] font-black uppercase">地圖</span>
                        </button>
                        <button onClick={handleScan} className="bg-slate-900 text-white p-4 rounded-2xl -mt-10 shadow-xl active:scale-95 transition-transform">
                            <Icon name="Scan" size={24} />
                        </button>
                        <button onClick={() => setActiveTab('mall')} className={`flex flex-col items-center gap-1 ${activeTab === 'mall' ? 'text-[#49B5A8]' : 'text-slate-300'}`}>
                            <Icon name="ShoppingBag" size={22} />
                            <span className="text-[9px] font-black uppercase">商城</span>
                        </button>
                        <button onClick={() => setActiveTab('info')} className={`flex flex-col items-center gap-1 ${activeTab === 'info' ? 'text-slate-900' : 'text-slate-300'}`}>
                            <Icon name="User" size={22} />
                            <span className="text-[9px] font-black uppercase">個人</span>
                        </button>
                    </nav>

                    {/* 遮罩功能 */}
                    {isScanning && (
                        <div className="absolute inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center text-white">
                            <div className="w-64 h-64 border-2 border-white/20 rounded-3xl relative overflow-hidden">
                                <div className="absolute top-0 w-full h-1.5 bg-[#49B5A8] shadow-[0_0_15px_#49B5A8] animate-scanner-move"></div>
                            </div>
                            <p className="mt-8 font-black animate-pulse">正在掃描 QR CODE...</p>
                        </div>
                    )}

                    {showScanSuccess && (
                        <div className="absolute inset-0 bg-[#49B5A8] z-[110] flex flex-col items-center justify-center text-white animate-in zoom-in">
                            <Icon name="CheckCircle2" size={80} className="mb-4" />
                            <h2 className="text-3xl font-black">歸還成功！</h2>
                            <p className="font-bold opacity-80">+50 Packoin</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
